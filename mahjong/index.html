<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将游戏 - Mahjong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
        }

        .table {
            background: #0d2818;
            border-radius: 15px;
            padding: 40px;
            position: relative;
            min-height: 600px;
        }

        .player-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
        }

        .player-label {
            color: #fff;
            font-size: 14px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .hand {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3px;
            min-height: 80px;
        }

        .tile {
            width: 50px;
            height: 70px;
            background: linear-gradient(145deg, #fffef5 0%, #f0e6d2 100%);
            border: 2px solid #8b7355;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            user-select: none;
            position: relative;
        }

        .tile:hover {
            transform: translateY(-10px);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
        }

        .tile.selected {
            transform: translateY(-15px);
            box-shadow: 0 0 15px #ffd700;
            border-color: #ffd700;
        }

        .tile.discard {
            opacity: 0.7;
        }

        .tile-number {
            font-size: 28px;
            font-weight: bold;
        }

        .tile-suit {
            font-size: 16px;
            margin-top: 2px;
        }

        .tile-honor {
            font-size: 24px;
            font-weight: bold;
        }

        .tile-flower {
            font-size: 20px;
        }

        .tile.wan .tile-number { color: #c41e3a; }
        .tile.tiao .tile-number { color: #228b22; }
        .tile.tiao .tile-suit { color: #228b22; }
        .tile.tong .tile-number { color: #1e3a8a; }
        .tile.tong .tile-suit { color: #1e3a8a; }
        .tile.honor .tile-honor { font-size: 28px; font-weight: bold; }
        .tile.honor.red { color: #c41e3a; }
        .tile.honor.green { color: #228b22; }
        .tile.honor.black { color: #1a1a1a; }
        .tile.flower .tile-flower { font-size: 32px; }

        .center-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .discard-pile {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            max-width: 300px;
            min-height: 100px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
        }

        .discard-pile .tile {
            width: 40px;
            height: 56px;
            font-size: 0.8em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            color: #1a472a;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #4a90a4 0%, #357a8c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74,144,164,0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-info {
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .game-status {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .message {
            font-size: 16px;
            min-height: 24px;
        }

        .wall-count {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a472a 0%, #2d5a3d 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            max-width: 400px;
            border: 3px solid #ffd700;
        }

        .modal h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .modal p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .tile { width: 40px; height: 56px; }
            .tile-number { font-size: 22px; }
            .tile-honor { font-size: 20px; }
            h1 { font-size: 1.8em; }
            .table { padding: 20px; }
        }
    </style>
</head>
<body>
    <h1>🀄 麻将游戏</h1>
    
    <div class="game-container">
        <div class="table">
            <div class="player-area">
                <div class="player-label">🤖 AI 玩家</div>
                <div class="hand" id="ai-hand"></div>
            </div>

            <div class="center-area">
                <div>
                    <div class="player-label">弃牌区</div>
                    <div class="discard-pile" id="discard-pile"></div>
                </div>
            </div>

            <div class="player-area">
                <div class="player-label">👤 你</div>
                <div class="hand" id="player-hand"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="draw-btn" onclick="drawTile()">摸牌</button>
                    <button class="btn btn-secondary" id="discard-btn" onclick="discardSelected()" disabled>出牌</button>
                    <button class="btn btn-secondary" id="new-game-btn" onclick="newGame()">新游戏</button>
                </div>
            </div>
        </div>

        <div class="game-info">
            <div class="game-status" id="game-status">点击"新游戏"开始</div>
            <div class="message" id="message"></div>
            <div class="wall-count" id="wall-count"></div>
        </div>
    </div>

    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <h2 id="modal-title">游戏结束</h2>
            <p id="modal-message"></p>
            <button class="btn btn-primary" onclick="closeModal()">再来一局</button>
        </div>
    </div>

    <script>
        const SUITS = {
            WAN: { name: '万', class: 'wan', values: ['一','二','三','四','五','六','七','八','九'] },
            TIAO: { name: '条', class: 'tiao', values: ['一','二','三','四','五','六','七','八','九'] },
            TONG: { name: '筒', class: 'tong', values: ['一','二','三','四','五','六','七','八','九'] }
        };

        const HONORS = [
            { name: '东', class: 'honor red' },
            { name: '南', class: 'honor red' },
            { name: '西', class: 'honor red' },
            { name: '北', class: 'honor red' },
            { name: '中', class: 'honor red' },
            { name: '发', class: 'honor green' },
            { name: '白', class: 'honor black' }
        ];

        let wall = [];
        let playerHand = [];
        let aiHand = [];
        let discardPile = [];
        let selectedTile = null;
        let currentPlayer = 'player';
        let gameOver = false;

        function createDeck() {
            const deck = [];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 4; j++) {
                    deck.push({ type: 'wan', value: i + 1, display: SUITS.WAN.values[i], suit: SUITS.WAN.name, className: 'wan' });
                }
            }
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 4; j++) {
                    deck.push({ type: 'tiao', value: i + 1, display: SUITS.TIAO.values[i], suit: SUITS.TIAO.name, className: 'tiao' });
                }
            }
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 4; j++) {
                    deck.push({ type: 'tong', value: i + 1, display: SUITS.TONG.values[i], suit: SUITS.TONG.name, className: 'tong' });
                }
            }
            for (let honor of HONORS) {
                for (let j = 0; j < 4; j++) {
                    deck.push({ type: 'honor', value: honor.name, display: honor.name, className: honor.class });
                }
            }
            return deck;
        }

        function shuffleDeck(deck) {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function createTileHTML(tile, index, isPlayer = true) {
            const div = document.createElement('div');
            div.className = `tile ${tile.className}`;
            div.dataset.index = index;
            if (tile.type === 'honor') {
                div.innerHTML = `<span class="tile-honor">${tile.display}</span>`;
            } else {
                div.innerHTML = `<span class="tile-number">${tile.display}</span><span class="tile-suit">${tile.suit}</span>`;
            }
            if (isPlayer) {
                div.onclick = () => selectTile(index, isPlayer);
            }
            return div;
        }

        function renderHand() {
            const playerDiv = document.getElementById('player-hand');
            const aiDiv = document.getElementById('ai-hand');
            playerDiv.innerHTML = '';
            aiDiv.innerHTML = '';
            playerHand.forEach((tile, index) => {
                const tileDiv = createTileHTML(tile, index, true);
                if (selectedTile === index) tileDiv.classList.add('selected');
                playerDiv.appendChild(tileDiv);
            });
            aiHand.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.style.background = 'linear-gradient(145deg, #8b7355 0%, #6b5345 100%)';
                div.innerHTML = '<span style="font-size: 24px;">🀄</span>';
                aiDiv.appendChild(div);
            });
        }

        function renderDiscardPile() {
            const pile = document.getElementById('discard-pile');
            pile.innerHTML = '';
            discardPile.forEach(tile => {
                const tileDiv = createTileHTML(tile, 0, false);
                tileDiv.classList.add('discard');
                pile.appendChild(tileDiv);
            });
        }

        function updateStatus(message) {
            document.getElementById('message').textContent = message;
            document.getElementById('wall-count').textContent = `剩余牌数：${wall.length}`;
        }

        function newGame() {
            wall = shuffleDeck(createDeck());
            playerHand = [];
            aiHand = [];
            discardPile = [];
            selectedTile = null;
            gameOver = false;
            currentPlayer = 'player';
            for (let i = 0; i < 13; i++) {
                playerHand.push(wall.pop());
                aiHand.push(wall.pop());
            }
            playerHand.push(wall.pop());
            renderHand();
            renderDiscardPile();
            updateStatus('轮到你了，请出牌');
            document.getElementById('game-status').textContent = '🎮 游戏中';
            document.getElementById('discard-btn').disabled = false;
            document.getElementById('draw-btn').disabled = true;
            document.getElementById('game-over-modal').style.display = 'none';
        }

        function selectTile(index, isPlayer) {
            if (!isPlayer || gameOver) return;
            selectedTile = index;
            renderHand();
        }

        function discardSelected() {
            if (selectedTile === null || gameOver) return;
            const tile = playerHand.splice(selectedTile, 1)[0];
            discardPile.push(tile);
            selectedTile = null;
            renderHand();
            renderDiscardPile();
            updateStatus('AI 思考中...');
            document.getElementById('discard-btn').disabled = true;
            setTimeout(aiTurn, 1000);
        }

        function aiTurn() {
            if (gameOver) return;
            if (wall.length > 0) aiHand.push(wall.pop());
            setTimeout(() => {
                if (aiHand.length > 0) {
                    const discardIndex = Math.floor(Math.random() * aiHand.length);
                    const tile = aiHand.splice(discardIndex, 1)[0];
                    discardPile.push(tile);
                    renderHand();
                    renderDiscardPile();
                    if (wall.length === 0) {
                        endGame('流局！牌墙已空');
                        return;
                    }
                    currentPlayer = 'player';
                    updateStatus('轮到你了，请摸牌');
                    document.getElementById('draw-btn').disabled = false;
                }
            }, 500);
        }

        function drawTile() {
            if (gameOver || wall.length === 0) {
                if (wall.length === 0) endGame('流局！牌墙已空');
                return;
            }
            const tile = wall.pop();
            playerHand.push(tile);
            renderHand();
            updateStatus('摸牌完成，请出牌');
            document.getElementById('draw-btn').disabled = true;
            document.getElementById('discard-btn').disabled = false;
            if (Math.random() < 0.05) {
                setTimeout(() => endGame('🎉 自摸！你赢了！', true), 500);
            }
        }

        function endGame(message, playerWin = false) {
            gameOver = true;
            document.getElementById('game-status').textContent = playerWin ? '🏆 你赢了！' : '游戏结束';
            document.getElementById('modal-title').textContent = playerWin ? '🎉 恭喜！' : '游戏结束';
            document.getElementById('modal-message').textContent = message;
            document.getElementById('game-over-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('game-over-modal').style.display = 'none';
            newGame();
        }

        document.getElementById('draw-btn').disabled = true;
        document.getElementById('discard-btn').disabled = true;
    </script>
</body>
</html>
