<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Games - 在线游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            font-size: 3em;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.2em;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .game-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-desc {
            color: #666;
            font-size: 1em;
            line-height: 1.5;
        }

        .game-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 15px;
        }

        footer {
            margin-top: 50px;
            color: rgba(255,255,255,0.7);
            text-align: center;
        }

        footer a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>🎮 Web Games</h1>
    <p class="subtitle">在线小游戏集合 - 即点即玩</p>

    <div class="games-grid">
        <a href="./mahjong/" class="game-card">
            <div class="game-icon">🀄</div>
            <div class="game-title">麻将游戏</div>
            <div class="game-desc">经典单机麻将，与 AI 对战<br>完整牌型，精美界面</div>
            <span class="game-tag">单机</span>
            <span class="game-tag">益智</span>
        </a>

        <!-- 更多游戏将在这里添加 -->
        <div class="game-card" style="opacity: 0.6;">
            <div class="game-icon">🎲</div>
            <div class="game-title">更多游戏</div>
            <div class="game-desc">敬请期待...<br>欢迎贡献你的游戏!</div>
            <span class="game-tag">Coming Soon</span>
        </div>
    </div>

    <footer>
        <p>Hosted on GitHub Pages</p>
        <p><a href="https://github.com/lizhipeng1/web-games" target="_blank">View on GitHub</a></p>
    </footer>
</body>
</html>
