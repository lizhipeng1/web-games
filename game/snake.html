<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 经典游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameCanvas {
            border: 4px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.5);
            background: #1a1a2e;
        }
        .score-board {
            margin-top: 20px;
            font-size: 1.5em;
            display: flex;
            gap: 40px;
        }
        .controls {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.7);
        }
        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #45b393;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.2);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .game-over h2 {
            color: #e74c3c;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }
        .mobile-btn {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            background: rgba(78, 204, 163, 0.3);
            border: 2px solid #4ecca3;
            color: white;
            font-size: 1.8em;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .mobile-btn:active {
            background: rgba(78, 204, 163, 0.6);
            transform: scale(0.95);
        }
        .dpad-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .dpad-spacer {
            width: 65px;
            height: 65px;
        }
        @media (max-width: 600px) {
            .mobile-controls {
                display: block;
            }
            #gameCanvas {
                max-width: 300px;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <h1>🐍 贪吃蛇</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="score-board">
        <div>得分：<span id="score">0</span></div>
        <div>最高分：<span id="highScore">0</span></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn" onclick="pauseGame()">暂停/继续</button>
        <p style="margin-top: 15px;">使用方向键 ↑ ↓ ← → 或 W A S D 控制</p>
    </div>
    
    <div class="mobile-controls">
        <div class="dpad-row">
            <div class="dpad-spacer"></div>
            <button class="mobile-btn" onclick="changeDirection('up')">↑</button>
            <div class="dpad-spacer"></div>
        </div>
        <div class="dpad-row">
            <button class="mobile-btn" onclick="changeDirection('left')">←</button>
            <button class="mobile-btn" onclick="changeDirection('down')">↓</button>
            <button class="mobile-btn" onclick="changeDirection('right')">→</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()" style="margin-top: 20px;">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isPaused = false;
        let gameSpeed = 150;
        
        document.getElementById('highScore').textContent = highScore;
        
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            document.getElementById('score').textContent = score;
            placeFood();
        }
        
        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 确保食物不在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 画网格
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 画食物
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 画蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#4ecca3';
                } else {
                    ctx.fillStyle = '#45b393';
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // 画蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 4;
                    if (direction === 'right') {
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 4, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction === 'left') {
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 4, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction === 'up') {
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 4, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 4, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 4, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                }
            });
        }
        
        function update() {
            if (isPaused) return;
            
            direction = nextDirection;
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 撞自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function startGame() {
            initGame();
            isPaused = false;
            gameSpeed = 150;
            document.getElementById('gameOver').style.display = 'none';
            clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
            draw();
        }
        
        function pauseGame() {
            isPaused = !isPaused;
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'down':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'left':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'right':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
                case ' ':
                    pauseGame();
                    break;
            }
        });
        
        // 初始绘制
        initGame();
        draw();
        
        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        const minSwipeDistance = 30;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 水平滑动
                if (Math.abs(diffX) > minSwipeDistance) {
                    if (diffX > 0) {
                        changeDirection('right');
                    } else {
                        changeDirection('left');
                    }
                }
            } else {
                // 垂直滑动
                if (Math.abs(diffY) > minSwipeDistance) {
                    if (diffY > 0) {
                        changeDirection('down');
                    } else {
                        changeDirection('up');
                    }
                }
            }
        }, {passive: false});
    </script>
</body>
</html>
