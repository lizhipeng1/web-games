<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消消乐 - 三消游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2em;
        }
        .game-container {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 5px;
            background: rgba(255,255,255,0.3);
            padding: 10px;
            border-radius: 15px;
        }
        .tile {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            user-select: none;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tile:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        .tile.selected {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            border: 3px solid white;
        }
        .tile.matched {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); }
        }
        .score-board {
            margin-top: 20px;
            font-size: 1.3em;
            display: flex;
            gap: 30px;
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 15px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn {
            background: white;
            color: #ff6b6b;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        .message h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        @media (max-width: 500px) {
            #gameBoard {
                grid-template-columns: repeat(8, 40px);
                grid-template-rows: repeat(8, 40px);
                gap: 3px;
            }
            .tile {
                width: 40px;
                height: 40px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>
    
    <h1>🍬 消消乐</h1>
    
    <div class="game-container">
        <div id="gameBoard"></div>
    </div>
    
    <div class="score-board">
        <div>得分：<span id="score">0</span></div>
        <div>步数：<span id="moves">0</span></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="initGame()">新游戏</button>
        <button class="btn" onclick="shuffle()">重新排列</button>
    </div>
    
    <div class="message" id="message">
        <h2>🎉 太棒了!</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="initGame()" style="margin-top: 20px;">再来一局</button>
    </div>

    <script>
        const emojis = ['🍎', '🍊', '🍇', '🍓', '🍒', '🍑', '🍋', '🫐'];
        const boardSize = 8;
        let board = [];
        let selectedTile = null;
        let score = 0;
        let moves = 0;
        let isProcessing = false;
        
        function createBoard() {
            board = [];
            for (let row = 0; row < boardSize; row++) {
                board[row] = [];
                for (let col = 0; col < boardSize; col++) {
                    let emoji;
                    do {
                        emoji = emojis[Math.floor(Math.random() * emojis.length)];
                    } while (
                        (col >= 2 && board[row][col-1] === emoji && board[row][col-2] === emoji) ||
                        (row >= 2 && board[row-1][col] === emoji && board[row-2][col] === emoji)
                    );
                    board[row][col] = emoji;
                }
            }
        }
        
        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.textContent = board[row][col];
                    tile.dataset.row = row;
                    tile.dataset.col = col;
                    tile.onclick = () => handleTileClick(row, col);
                    gameBoard.appendChild(tile);
                }
            }
        }
        
        function handleTileClick(row, col) {
            if (isProcessing) return;
            
            const tile = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            
            if (!selectedTile) {
                selectedTile = {row, col};
                tile.classList.add('selected');
            } else {
                const prevTile = document.querySelector(`[data-row="${selectedTile.row}"][data-col="${selectedTile.col}"]`);
                prevTile.classList.remove('selected');
                
                const rowDiff = Math.abs(row - selectedTile.row);
                const colDiff = Math.abs(col - selectedTile.col);
                
                if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                    swapTiles(selectedTile.row, selectedTile.col, row, col);
                }
                
                selectedTile = null;
            }
        }
        
        async function swapTiles(row1, col1, row2, col2) {
            isProcessing = true;
            
            // 交换
            [board[row1][col1], board[row2][col2]] = [board[row2][col2], board[row1][col1]];
            renderBoard();
            
            await sleep(300);
            
            const matches = findMatches();
            
            if (matches.length > 0) {
                moves++;
                document.getElementById('moves').textContent = moves;
                await processMatches(matches);
            } else {
                // 换回来
                [board[row1][col1], board[row2][col2]] = [board[row2][col2], board[row1][col1]];
                renderBoard();
            }
            
            isProcessing = false;
        }
        
        function findMatches() {
            const matches = [];
            
            // 横向匹配
            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize - 2; col++) {
                    const emoji = board[row][col];
                    if (board[row][col+1] === emoji && board[row][col+2] === emoji) {
                        matches.push({row, col});
                        matches.push({row, col: col+1});
                        matches.push({row, col: col+2});
                    }
                }
            }
            
            // 纵向匹配
            for (let col = 0; col < boardSize; col++) {
                for (let row = 0; row < boardSize - 2; row++) {
                    const emoji = board[row][col];
                    if (board[row+1][col] === emoji && board[row+2][col] === emoji) {
                        matches.push({row, col});
                        matches.push({row: row+1, col});
                        matches.push({row: row+2, col});
                    }
                }
            }
            
            // 去重
            const unique = [];
            const seen = new Set();
            for (let match of matches) {
                const key = `${match.row},${match.col}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push(match);
                }
            }
            
            return unique;
        }
        
        async function processMatches(matches) {
            // 标记匹配
            matches.forEach(({row, col}) => {
                const tile = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                if (tile) tile.classList.add('matched');
            });
            
            score += matches.length * 10;
            document.getElementById('score').textContent = score;
            
            await sleep(300);
            
            // 消除并下落
            matches.forEach(({row, col}) => {
                board[row][col] = null;
            });
            
            // 下落
            for (let col = 0; col < boardSize; col++) {
                let emptyRow = boardSize - 1;
                for (let row = boardSize - 1; row >= 0; row--) {
                    if (board[row][col] !== null) {
                        board[emptyRow][col] = board[row][col];
                        if (emptyRow !== row) {
                            board[row][col] = null;
                        }
                        emptyRow--;
                    }
                }
                // 填充顶部
                for (let row = emptyRow; row >= 0; row--) {
                    board[row][col] = emojis[Math.floor(Math.random() * emojis.length)];
                }
            }
            
            renderBoard();
            
            await sleep(300);
            
            // 检查连锁反应
            const newMatches = findMatches();
            if (newMatches.length > 0) {
                await processMatches(newMatches);
            }
        }
        
        function shuffle() {
            if (isProcessing) return;
            const flat = board.flat().filter(x => x);
            for (let i = flat.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flat[i], flat[j]] = [flat[j], flat[i]];
            }
            let idx = 0;
            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    board[row][col] = flat[idx++];
                }
            }
            renderBoard();
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function initGame() {
            score = 0;
            moves = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('message').style.display = 'none';
            createBoard();
            renderBoard();
        }
        
        initGame();
    </script>
</body>
</html>
